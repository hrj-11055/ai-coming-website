<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2ff"/>
    </linearGradient>
    <filter id="s"><feDropShadow dx="0" dy="9" stdDeviation="12" flood-color="#312e81" flood-opacity=".14"/></filter>
  </defs>
  <rect width="1200" height="675" rx="32" fill="url(#bg2)"/>
  <text x="65" y="92" fill="#312e81" font-size="42" font-family="Arial, PingFang SC, sans-serif" font-weight="800">Codex 高质量任务闭环</text>
  <text x="65" y="132" fill="#64748b" font-size="21" font-family="Arial, PingFang SC, sans-serif">高质量不是“一句话生成”，而是让上下文、约束和验证形成闭环</text>
  <path d="M186 330 H1010" stroke="#c7d2fe" stroke-width="10" stroke-linecap="round"/>
  <g font-family="Arial, PingFang SC, sans-serif" text-anchor="middle" filter="url(#s)">
    <g><circle cx="170" cy="330" r="76" fill="#0f766e"/><text x="170" y="320" fill="#fff" font-size="25" font-weight="800">1. 上下文</text><text x="170" y="352" fill="#ccfbf1" font-size="17">目标与现状</text></g>
    <g><circle cx="385" cy="330" r="76" fill="#0369a1"/><text x="385" y="320" fill="#fff" font-size="25" font-weight="800">2. 约束</text><text x="385" y="352" fill="#e0f2fe" font-size="17">边界与标准</text></g>
    <g><circle cx="600" cy="330" r="76" fill="#4338ca"/><text x="600" y="320" fill="#fff" font-size="25" font-weight="800">3. 执行</text><text x="600" y="352" fill="#e0e7ff" font-size="17">读、改、运行</text></g>
    <g><circle cx="815" cy="330" r="76" fill="#7e22ce"/><text x="815" y="320" fill="#fff" font-size="25" font-weight="800">4. 验证</text><text x="815" y="352" fill="#f3e8ff" font-size="17">测试与截图</text></g>
    <g><circle cx="1030" cy="330" r="76" fill="#be123c"/><text x="1030" y="320" fill="#fff" font-size="25" font-weight="800">5. 审查</text><text x="1030" y="352" fill="#ffe4e6" font-size="17">diff 与风险</text></g>
  </g>
  <g font-family="Arial, PingFang SC, sans-serif">
    <rect x="92" y="480" width="1016" height="112" rx="20" fill="#fff" stroke="#c7d2fe" stroke-width="2"/>
    <text x="125" y="523" fill="#312e81" font-size="21" font-weight="800">可直接复制的任务结构</text>
    <text x="125" y="558" fill="#475569" font-size="19">“先阅读相关文件并说明计划；只改必要范围；完成后运行指定测试；最后总结改动、验证证据和剩余风险。”</text>
  </g>
</svg>
