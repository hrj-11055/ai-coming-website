<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#1e1b4b"/>
    </linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="10" stdDeviation="12" flood-opacity=".3"/></filter>
  </defs>
  <rect width="1200" height="675" rx="32" fill="url(#bg3)"/>
  <text x="70" y="92" fill="#fff" font-size="42" font-family="Arial, PingFang SC, sans-serif" font-weight="800">把 Codex 调成你的工程队友</text>
  <text x="70" y="132" fill="#a5b4fc" font-size="21" font-family="Arial, PingFang SC, sans-serif">先固化规则，再接外部能力，最后扩展并行工作</text>
  <g font-family="Arial, PingFang SC, sans-serif" filter="url(#sh)">
    <rect x="105" y="210" width="990" height="85" rx="18" fill="#312e81"/>
    <text x="145" y="247" fill="#c7d2fe" font-size="18" font-weight="700">第一层 · 仓库规则</text>
    <text x="145" y="277" fill="#fff" font-size="25" font-weight="800">AGENTS.md：命令、风格、验收标准、发布流程</text>
    <rect x="155" y="320" width="890" height="85" rx="18" fill="#155e75"/>
    <text x="195" y="357" fill="#a5f3fc" font-size="18" font-weight="700">第二层 · 可复用工作流</text>
    <text x="195" y="387" fill="#fff" font-size="25" font-weight="800">Skills：把反复成功的方法打包成能力</text>
    <rect x="205" y="430" width="790" height="85" rx="18" fill="#166534"/>
    <text x="245" y="467" fill="#bbf7d0" font-size="18" font-weight="700">第三层 · 外部系统</text>
    <text x="245" y="497" fill="#fff" font-size="25" font-weight="800">MCP：连接文档、GitHub、浏览器与设计工具</text>
    <rect x="255" y="540" width="690" height="70" rx="18" fill="#9f1239"/>
    <text x="600" y="583" fill="#fff" text-anchor="middle" font-size="25" font-weight="800">Subagents：独立任务并行推进</text>
  </g>
</svg>
