<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户地理位置统计 - AI资讯管理系统</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .stat-card h3 {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .stat-card .value {
            color: #333;
            font-size: 36px;
            font-weight: bold;
        }

        .chart-container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .chart-container h2 {
            color: #333;
            font-size: 20px;
            margin-bottom: 20px;
        }

        .chart-wrapper {
            position: relative;
            height: 500px;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
        }

        .btn-danger {
            background: #e53e3e;
            color: white;
        }

        .btn-danger:hover {
            background: #c53030;
        }

        .select {
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            background: white;
        }

        .logs-table {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow-x: auto;
        }

        .logs-table h2 {
            color: #333;
            font-size: 20px;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            background: #f7f7f7;
            font-weight: 600;
            color: #333;
        }

        td {
            color: #666;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }

        .pagination button {
            padding: 8px 16px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 6px;
            cursor: pointer;
        }

        .pagination button:hover {
            background: #f7f7f7;
        }

        .pagination button.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .no-data {
            text-align: center;
            padding: 60px;
            color: #999;
        }

        .province-tag {
            display: inline-block;
            padding: 4px 12px;
            background: #e3f2fd;
            color: #1976d2;
            border-radius: 12px;
            font-size: 12px;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: white;
            text-decoration: none;
            font-weight: 500;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }

            .chart-wrapper {
                height: 350px;
            }

            .controls {
                flex-direction: column;
            }

            .btn, .select {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← 返回首页</a>
        <a href="admin-ipban.html" class="back-link" style="margin-left: 20px;">🔒 IP封禁管理</a>
        <a href="admin-ai-usage.html" class="back-link" style="margin-left: 20px;">AI用量统计</a>
        <a href="#" class="back-link" onclick="logout()" style="margin-left: 20px;">退出登录</a>

        <div class="header">
            <h1>用户地理位置统计</h1>
            <p>实时查看用户访问分布情况和详细访问日志</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>总访问量</h3>
                <div class="value" id="totalVisits">-</div>
            </div>
            <div class="stat-card">
                <h3>覆盖省份数</h3>
                <div class="value" id="provinceCount">-</div>
            </div>
            <div class="stat-card">
                <h3>最活跃省份</h3>
                <div class="value" id="topProvince" style="font-size: 24px;">-</div>
            </div>
            <div class="stat-card">
                <h3>今日访问</h3>
                <div class="value" id="todayVisits">-</div>
            </div>
        </div>

        <div class="chart-container">
            <h2>省份访问分布</h2>
            <div class="controls">
                <button class="btn btn-primary" onclick="refreshData()">刷新数据</button>
                <button class="btn btn-danger" onclick="cleanupLogs()">清理旧日志</button>
            </div>
            <div class="chart-wrapper">
                <canvas id="provinceChart"></canvas>
            </div>
        </div>

        <div class="logs-table">
            <h2>详细访问日志</h2>
            <div class="controls">
                <select class="select" id="provinceFilter" onchange="loadLogs(1)">
                    <option value="all">所有省份</option>
                </select>
                <button class="btn btn-primary" onclick="loadLogs(1)">查询</button>
            </div>
            <div id="logsContainer">
                <div class="loading">加载中...</div>
            </div>
        </div>
    </div>

    <script>
        let provinceChart = null;
        let authToken = localStorage.getItem('admin_token');

        // 注册 Chart.js 数据标签插件
        Chart.register(ChartDataLabels);

        // 页面加载时初始化
        window.addEventListener('load', () => {
            if (!authToken) {
                // 未登录，跳转到登录页面
                window.location.href = 'admin-login.html?return=' + encodeURIComponent(window.location.href);
                return;
            }

            loadProvinceStats();
            loadLogs(1);
        });

        // 加载省份统计数据
        async function loadProvinceStats() {
            try {
                const response = await fetch('/api/visit/province-stats', {
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    updateStats(data);
                    renderChart(data.provinceStats);
                    updateProvinceFilter(data.provinceStats);
                } else if (response.status === 401) {
                    alert('登录已过期，请重新登录');
                    localStorage.removeItem('admin_token');
                    window.location.href = 'index.html';
                }
            } catch (error) {
                console.error('加载统计数据失败:', error);
                alert('加载数据失败');
            }
        }

        // 更新统计卡片
        function updateStats(data) {
            document.getElementById('totalVisits').textContent = data.total;
            document.getElementById('provinceCount').textContent = data.provinceStats.length;

            if (data.provinceStats.length > 0) {
                document.getElementById('topProvince').textContent = data.provinceStats[0].province;
            } else {
                document.getElementById('topProvince').textContent = '暂无数据';
            }

            // 计算今日访问
            const today = new Date().toISOString().split('T')[0];
            const todayCount = data.provinceStats.reduce((sum, stat) => {
                // 这里需要从详细日志中统计，暂时显示总数
                return sum + stat.count;
            }, 0);
            document.getElementById('todayVisits').textContent = todayCount;
        }

        // 渲染图表
        function renderChart(provinceStats) {
            const ctx = document.getElementById('provinceChart').getContext('2d');

            // 销毁旧图表
            if (provinceChart) {
                provinceChart.destroy();
            }

            // 准备数据（只显示前15个省份）
            const topStats = provinceStats.slice(0, 15);
            const labels = topStats.map(s => s.province);
            const values = topStats.map(s => s.count);

            // 生成颜色
            const colors = generateColors(values.length);

            provinceChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '访问量',
                        data: values,
                        backgroundColor: colors,
                        borderColor: colors.map(c => c.replace('0.8', '1')),
                        borderWidth: 2,
                        borderRadius: 8,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return `${context.parsed.y} 次访问`;
                                }
                            }
                        },
                        datalabels: {
                            anchor: 'end',
                            align: 'top',
                            color: '#333',
                            font: {
                                weight: 'bold',
                                size: 12
                            },
                            formatter: function(value) {
                                return value;
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                stepSize: 1
                            }
                        },
                        x: {
                            ticks: {
                                maxRotation: 45,
                                minRotation: 45
                            }
                        }
                    }
                }
            });
        }

        // 生成颜色数组
        function generateColors(count) {
            const baseColors = [
                'rgba(102, 126, 234, 0.8)',
                'rgba(118, 75, 162, 0.8)',
                'rgba(237, 100, 166, 0.8)',
                'rgba(255, 154, 158, 0.8)',
                'rgba(250, 208, 196, 0.8)',
                'rgba(161, 196, 253, 0.8)',
                'rgba(194, 233, 251, 0.8)',
                'rgba(42, 157, 143, 0.8)',
                'rgba(0, 180, 216, 0.8)',
                'rgba(106, 176, 76, 0.8)',
                'rgba(203, 214, 46, 0.8)',
                'rgba(255, 160, 0, 0.8)',
                'rgba(255, 87, 51, 0.8)',
                'rgba(255, 71, 87, 0.8)',
                'rgba(155, 89, 182, 0.8)'
            ];

            const colors = [];
            for (let i = 0; i < count; i++) {
                colors.push(baseColors[i % baseColors.length]);
            }
            return colors;
        }

        // 更新省份筛选器
        function updateProvinceFilter(provinceStats) {
            const select = document.getElementById('provinceFilter');
            select.innerHTML = '<option value="all">所有省份</option>';

            provinceStats.forEach(stat => {
                const option = document.createElement('option');
                option.value = stat.province;
                option.textContent = `${stat.province} (${stat.count})`;
                select.appendChild(option);
            });
        }

        // 加载访问日志
        async function loadLogs(page = 1) {
            try {
                const province = document.getElementById('provinceFilter').value;
                const url = `/api/visit/logs?page=${page}&limit=20&province=${province}`;

                const response = await fetch(url, {
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    renderLogs(data.logs);
                    renderPagination(data.pagination);
                } else if (response.status === 401) {
                    alert('登录已过期，请重新登录');
                    localStorage.removeItem('admin_token');
                    window.location.href = 'index.html';
                }
            } catch (error) {
                console.error('加载日志失败:', error);
                document.getElementById('logsContainer').innerHTML = '<div class="no-data">加载失败</div>';
            }
        }

        // 渲染日志表格
        function renderLogs(logs) {
            const container = document.getElementById('logsContainer');

            if (logs.length === 0) {
                container.innerHTML = '<div class="no-data">暂无访问日志</div>';
                return;
            }

            const html = `
                <table>
                    <thead>
                        <tr>
                            <th>时间</th>
                            <th>IP地址</th>
                            <th>省份</th>
                            <th>国家</th>
                            <th>用户代理</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${logs.map(log => `
                            <tr>
                                <td>${formatDate(log.date)}</td>
                                <td>${maskIP(log.ip)}</td>
                                <td><span class="province-tag">${log.province}</span></td>
                                <td>${log.country}</td>
                                <td style="max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${log.userAgent}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;

            container.innerHTML = html;
        }

        // 渲染分页
        function renderPagination(pagination) {
            const container = document.getElementById('logsContainer');
            const { page, totalPages } = pagination;

            if (totalPages <= 1) return;

            let html = '<div class="pagination">';

            // 上一页
            if (page > 1) {
                html += `<button onclick="loadLogs(${page - 1})">上一页</button>`;
            }

            // 页码
            for (let i = 1; i <= totalPages; i++) {
                if (i === page) {
                    html += `<button class="active">${i}</button>`;
                } else {
                    html += `<button onclick="loadLogs(${i})">${i}</button>`;
                }
            }

            // 下一页
            if (page < totalPages) {
                html += `<button onclick="loadLogs(${page + 1})">下一页</button>`;
            }

            html += '</div>';
            container.innerHTML += html;
        }

        // 格式化日期
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleString('zh-CN');
        }

        // 掩码IP地址
        function maskIP(ip) {
            if (ip === '未知') return ip;
            const parts = ip.split('.');
            if (parts.length === 4) {
                return `${parts[0]}.${parts[1]}.***.***`;
            }
            return ip;
        }

        // 刷新数据
        function refreshData() {
            loadProvinceStats();
            loadLogs(1);
        }

        // 清理旧日志
        async function cleanupLogs() {
            const days = prompt('请输入要保留的天数（默认30天）:', '30');
            if (!days) return;

            if (!confirm(`确定要删除 ${days} 天前的所有日志吗？此操作不可恢复！`)) {
                return;
            }

            try {
                const response = await fetch(`/api/visit/logs/cleanup?days=${days}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    alert(`清理成功！删除了 ${data.deleted} 条记录`);
                    refreshData();
                } else {
                    alert('清理失败');
                }
            } catch (error) {
                console.error('清理日志失败:', error);
                alert('清理失败');
            }
        }

        // 退出登录
        function logout() {
            if (confirm('确定要退出登录吗？')) {
                localStorage.removeItem('admin_token');
                localStorage.removeItem('admin_user');
                window.location.href = 'admin-login.html';
            }
        }
    </script>
</body>
</html>
