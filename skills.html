<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 能力库 - AIcoming</title>
    <meta name="description" content="AIcoming AI 能力库：按模块查看高频好用的 Skill 与 MCP，快速找到可直接复用的能力。">
    <meta name="keywords" content="AI能力库,Claude Skills,AI Skills,AIcoming,Skill导航">

    <link rel="icon" type="image/png" sizes="32x32" href="/pic/logo-icon.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/pic/logo-icon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/pic/logo-icon.png">

    <script src="/vendor/tailwindcss-cdn.js"></script>
    <script src="/vendor/alpinejs-cdn.min.js" defer></script>
    <link href="/vendor/fontawesome/css/all.min.css" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">

    <style>
        :root {
            --skills-nav-height: 64px;
        }

        body {
            margin: 0;
            background:
                radial-gradient(circle at top left, rgba(102, 126, 234, 0.11) 0%, transparent 30%),
                radial-gradient(circle at 95% 15%, rgba(118, 75, 162, 0.1) 0%, transparent 24%),
                var(--ai-bg-muted, #f3f4f6);
            color: var(--ai-text-primary, #111827);
            font-family: var(--ai-font-ui, "PingFang SC", "Hiragino Sans GB", "Noto Sans SC", "Microsoft YaHei", sans-serif);
        }

        .skills-page {
            max-width: 1420px;
            margin: 0 auto;
            padding: calc(var(--skills-nav-height) + 18px) 16px 42px;
        }

        .skills-layout {
            display: grid;
            grid-template-columns: 260px minmax(0, 1fr);
            gap: 16px;
            align-items: start;
        }

        .skills-sidebar {
            position: sticky;
            top: calc(var(--skills-nav-height) + 14px);
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid var(--ai-border, #e5e7eb);
            border-radius: 18px;
            box-shadow: var(--ai-shadow-sm, 0 2px 8px rgba(0, 0, 0, 0.08));
            padding: 14px;
        }

        .skills-sidebar h2 {
            margin: 0;
            font-size: 17px;
            letter-spacing: -0.02em;
        }

        .skills-sidebar p {
            margin: 10px 0 0;
            color: var(--ai-text-muted, #6b7280);
            font-size: 13px;
            line-height: 1.6;
        }

        .skills-sidebar-stats {
            margin-top: 14px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .skills-stat {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 10px;
            border-radius: 999px;
            background: #eef2ff;
            color: #4338ca;
            font-size: 12px;
            font-weight: 700;
        }

        .skills-nav-list {
            display: grid;
            gap: 8px;
            margin-top: 16px;
        }

        .skill-nav-link {
            display: flex;
            gap: 10px;
            align-items: center;
            padding: 10px 12px;
            border-radius: 14px;
            border: 1px solid #edf1f5;
            text-decoration: none;
            color: #334155;
            background: linear-gradient(180deg, #ffffff 0%, #fafcff 100%);
            transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
        }

        .skill-nav-link:hover,
        .skill-nav-link.active {
            transform: translateX(2px);
            border-color: #d9d6fe;
            box-shadow: 0 14px 28px -22px rgba(79, 70, 229, 0.5);
            background: linear-gradient(135deg, #f7f5ff 0%, #eef2ff 100%);
            color: #4338ca;
        }

        .skill-nav-icon {
            width: 38px;
            height: 38px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            background: #eef2ff;
            color: #4f46e5;
            flex-shrink: 0;
        }

        .skill-nav-copy {
            display: grid;
            gap: 2px;
        }

        .skill-nav-copy strong {
            font-size: 14px;
        }

        .skill-nav-copy small {
            color: var(--ai-text-muted, #6b7280);
            font-size: 12px;
        }

        .skills-main {
            display: grid;
            gap: 16px;
        }

        .skill-section {
            background: rgba(255, 255, 255, 0.94);
            border: 1px solid var(--ai-border, #e5e7eb);
            border-radius: 22px;
            padding: 22px;
            box-shadow: var(--ai-shadow-sm, 0 2px 8px rgba(0, 0, 0, 0.08));
        }

        .skill-section-head {
            display: flex;
            gap: 12px;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 18px;
        }

        .skill-section-kicker {
            color: var(--ai-brand-700, #4c63cf);
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .skill-section-head h2 {
            margin: 6px 0 8px;
            font-size: 28px;
            letter-spacing: -0.03em;
        }

        .skill-section-head p {
            margin: 0;
            max-width: 680px;
            color: var(--ai-text-secondary, #374151);
            line-height: 1.75;
            font-size: 15px;
        }

        .skill-section-meta {
            flex-shrink: 0;
            border-radius: 999px;
            padding: 9px 12px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            color: #475569;
            font-size: 12px;
            font-weight: 700;
        }

        .skill-card-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 14px;
        }

        .skill-card {
            display: grid;
            gap: 14px;
            padding: 18px;
            min-height: 220px;
            border-radius: 18px;
            background: linear-gradient(180deg, #ffffff 0%, #fbfdff 100%);
            border: 1px solid #e8edf3;
            box-shadow: 0 18px 34px -28px rgba(15, 23, 42, 0.35);
        }

        .skill-card-top {
            display: grid;
            gap: 10px;
        }

        .skill-module-chip {
            display: inline-flex;
            align-items: center;
            width: fit-content;
            border-radius: 999px;
            padding: 6px 10px;
            background: #eef2ff;
            color: #4338ca;
            font-size: 12px;
            font-weight: 700;
        }

        .skill-card h3 {
            margin: 0;
            font-size: 20px;
            line-height: 1.3;
            letter-spacing: -0.02em;
        }

        .skill-headline,
        .skill-scenario {
            margin: 0;
            color: var(--ai-text-secondary, #374151);
            font-size: 14px;
            line-height: 1.72;
        }

        .skill-card-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: auto;
            width: fit-content;
            text-decoration: none;
            color: #111827;
            font-weight: 700;
        }

        .skill-card-link:hover {
            color: var(--ai-brand-700, #4c63cf);
        }

        @media (max-width: 1120px) {
            .skills-layout {
                grid-template-columns: 1fr;
            }

            .skills-sidebar {
                position: static;
            }

            .skills-nav-list {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .skill-card-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 720px) {
            .skills-page {
                padding-left: 12px;
                padding-right: 12px;
            }

            .skills-nav-list,
            .skill-card-grid {
                grid-template-columns: 1fr;
            }

            .skill-section {
                padding: 18px;
            }

            .skill-section-head {
                flex-direction: column;
            }
        }
    </style>
</head>

    <main class="skills-page">
        <div class="skills-layout">
