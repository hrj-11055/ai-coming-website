            - paragraph [ref=e95]:
              - generic [ref=e96]: 
              - generic [ref=e97]: 英伟达发布机器人世界模型 Eureka 2，模型参数 10B，支持文本、图像、视频、点云等多模态输入，在 10 种不同机器人平台上完成超过 30 项复杂任务，训练效率较前代提升 100 倍。
            - paragraph [ref=e98]: 英伟达发布通用机器人基础模型 Eureka 2，旨在实现单一模型驱动多种形态的机器人。此举标志着机器人领域正从专用、碎片化的模型开发，向基于统一世界模型的通用智能体范式转移。其核心信号在于，英伟达正试图将 AI 领域的“基础模型”逻辑复制到机器人产业，通过提供统一的软件层（Eureka 2）来巩固其硬件（如 Jetson、Isaac Sim）的生态护城河。这将对依赖专用解决方案的机器人公司构成降维打击，并加速行业整合。真正的瓶颈在于物理世界数据的规模、质量和仿真到现实的迁移效率。
