<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI工具集 - AIcoming</title>

    <meta name="description" content="AIcoming 工具集：按分类收录实用AI工具，点击图标即可直达官网。">
    <meta name="keywords" content="AI工具集,AI工具,人工智能工具,效率工具,Agent工具">

    <link rel="icon" type="image/png" sizes="32x32" href="/pic/logo-icon.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/pic/logo-icon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/pic/logo-icon.png">

    <script src="/vendor/tailwindcss-cdn.js"></script>
    <script src="/vendor/alpinejs-cdn.min.js" defer></script>
    <link href="/vendor/fontawesome/css/all.min.css" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">

    <style>
        :root {
            --bg: var(--ai-bg-muted, #f3f4f6);
            --panel: var(--ai-bg-surface, #ffffff);
            --line: var(--ai-border, #e5e7eb);
            --text: var(--ai-text-primary, #111827);
            --muted: var(--ai-text-muted, #6b7280);
            --font-ui: var(--ai-font-ui, "PingFang SC", "Hiragino Sans GB", "Noto Sans SC", "Microsoft YaHei", sans-serif);
            --tools-nav-height: 64px;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-ui);
        }

        .tools-page {
            max-width: 1580px;
            margin: 0 auto;
            padding: calc(var(--tools-nav-height) + 14px) 14px 14px;
        }

        .tools-layout {
            display: grid;
            grid-template-columns: 210px 1fr;
            gap: 14px;
            align-items: start;
        }

        .sidebar {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 10px;
            position: sticky;
            top: calc(var(--tools-nav-height) + 12px);
            max-height: calc(100vh - 92px);
            overflow: auto;
        }

        .sidebar-title {
            font-size: 14px;
            font-weight: 700;
            color: #374151;
            margin: 6px 8px 10px;
        }

        .category-list {
            display: grid;
            gap: 6px;
        }

        .category-link {
            --category-accent: #4f46e5;
            --category-accent-strong: #3730a3;
            --category-bg: linear-gradient(135deg, #f5f3ff 0%, #eef2ff 100%);
            --category-border: #d9d6fe;
            --category-shadow: rgba(79, 70, 229, 0.16);
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 9px 10px;
            border-radius: 10px;
            border: 1px solid #edf1f5;
            color: #334155;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            background: linear-gradient(180deg, #ffffff 0%, #fbfdff 100%);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.72);
            transition: transform 0.16s ease, border-color 0.16s ease, box-shadow 0.16s ease, background 0.16s ease, color 0.16s ease;
            position: relative;
            overflow: hidden;
        }

        .category-link::before {
            content: '';
            position: absolute;
            left: 0;
            top: 7px;
            bottom: 7px;
            width: 4px;
            border-radius: 999px;
            background: linear-gradient(180deg, var(--category-accent) 0%, var(--category-accent-strong) 100%);
            opacity: 0.34;
            transition: opacity 0.16s ease, transform 0.16s ease;
            transform: scaleY(0.82);
        }

        .category-link .category-icon {
            width: 28px;
            height: 28px;
            border-radius: 9px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: var(--category-accent-strong);
            background: color-mix(in srgb, var(--category-accent) 14%, #ffffff);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.76);
            flex-shrink: 0;
        }

        .category-link .category-icon i {
            font-size: 14px;
            line-height: 1;
        }

        .category-link .category-icon svg {
            width: 16px;
            height: 16px;
            display: block;
        }

        .category-link:hover {
            background: var(--category-bg);
            border-color: var(--category-border);
            color: var(--category-accent-strong);
            box-shadow: 0 10px 18px -14px var(--category-shadow);
            transform: translateX(2px);
        }

        .category-link:hover::before {
            opacity: 0.8;
            transform: scaleY(1);
        }

        .category-link.active {
            background: var(--category-bg);
            border-color: var(--category-border);
            color: var(--category-accent-strong);
            font-weight: 700;
            box-shadow: 0 16px 28px -18px var(--category-shadow);
        }

        .category-link.active::before {
            opacity: 1;
            transform: scaleY(1);
        }

        .category-link[data-tone="violet"] {
            --category-accent: #8b5cf6;
            --category-accent-strong: #6d28d9;
            --category-bg: linear-gradient(135deg, #f8f4ff 0%, #f1ebff 100%);
            --category-border: #ddd2fe;
            --category-shadow: rgba(139, 92, 246, 0.24);
        }

        .category-link[data-tone="amber"] {
            --category-accent: #f59e0b;
            --category-accent-strong: #b45309;
            --category-bg: linear-gradient(135deg, #fff8eb 0%, #fff2d6 100%);
            --category-border: #f7ddb0;
            --category-shadow: rgba(245, 158, 11, 0.24);
        }

        .category-link[data-tone="rose"] {
            --category-accent: #f43f5e;
            --category-accent-strong: #be123c;
            --category-bg: linear-gradient(135deg, #fff1f4 0%, #ffe3ea 100%);
            --category-border: #fec8d4;
            --category-shadow: rgba(244, 63, 94, 0.22);
        }

        .category-link[data-tone="sky"] {
            --category-accent: #0ea5e9;
            --category-accent-strong: #0369a1;
            --category-bg: linear-gradient(135deg, #eef9ff 0%, #dff2ff 100%);
            --category-border: #b9e6fb;
            --category-shadow: rgba(14, 165, 233, 0.24);
        }

        .category-link[data-tone="emerald"] {
            --category-accent: #10b981;
            --category-accent-strong: #047857;
            --category-bg: linear-gradient(135deg, #effdf6 0%, #dcfceb 100%);
            --category-border: #b9efd7;
            --category-shadow: rgba(16, 185, 129, 0.24);
        }

        .category-link[data-tone="cyan"] {
            --category-accent: #06b6d4;
            --category-accent-strong: #0f766e;
            --category-bg: linear-gradient(135deg, #ecfeff 0%, #d9fbff 100%);
            --category-border: #afeef6;
            --category-shadow: rgba(6, 182, 212, 0.22);
        }

        .category-link[data-tone="indigo"] {
            --category-accent: #6366f1;
            --category-accent-strong: #4338ca;
            --category-bg: linear-gradient(135deg, #f1f5ff 0%, #e4e9ff 100%);
            --category-border: #cbd5ff;
            --category-shadow: rgba(99, 102, 241, 0.22);
        }

        .category-link[data-tone="teal"] {
            --category-accent: #14b8a6;
            --category-accent-strong: #0f766e;
            --category-bg: linear-gradient(135deg, #effdfa 0%, #daf8f2 100%);
            --category-border: #b8ece4;
            --category-shadow: rgba(20, 184, 166, 0.22);
        }

        .category-link[data-tone="fuchsia"] {
            --category-accent: #d946ef;
            --category-accent-strong: #a21caf;
            --category-bg: linear-gradient(135deg, #fdf2ff 0%, #f8e2ff 100%);
            --category-border: #efc2fb;
            --category-shadow: rgba(217, 70, 239, 0.22);
        }

        .category-link[data-tone="orange"] {
            --category-accent: #f97316;
            --category-accent-strong: #c2410c;
            --category-bg: linear-gradient(135deg, #fff4ec 0%, #ffe6d4 100%);
            --category-border: #fbd0b0;
            --category-shadow: rgba(249, 115, 22, 0.22);
        }

        .category-link[data-tone="lime"] {
            --category-accent: #84cc16;
            --category-accent-strong: #4d7c0f;
            --category-bg: linear-gradient(135deg, #f7fde9 0%, #ebf9cf 100%);
            --category-border: #d5ecaa;
            --category-shadow: rgba(132, 204, 22, 0.22);
        }

        .category-link[data-tone="slate"] {
            --category-accent: #64748b;
            --category-accent-strong: #334155;
            --category-bg: linear-gradient(135deg, #f8fafc 0%, #edf2f8 100%);
            --category-border: #d8e0ea;
            --category-shadow: rgba(100, 116, 139, 0.2);
        }

        .main-area {
            min-width: 0;
            display: grid;
            gap: 12px;
        }

        .lane-guide {
            background: linear-gradient(90deg, #fffbf4 0%, #fffbf4 49.3%, #f8fbff 50.7%, #f8fbff 100%);
            border: 1px solid var(--line);
            border-radius: 12px;
            display: grid;
            grid-template-columns: 1fr 24px 1fr;
            align-items: center;
            min-height: 54px;
            padding: 0 14px;
            overflow: hidden;
        }

        .lane-label {
            text-align: center;
            font-size: 15px;
            font-weight: 600;
            color: #374151;
            letter-spacing: 0.2px;
        }

        .lane-label--intl {
            color: #1e40af;
        }

        .lane-label--cn {
            color: #9a3412;
        }

        .lane-divider {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        .lane-divider::before {
            content: '';
            width: 2px;
            height: 30px;
            background: linear-gradient(180deg, #cbd5e1, #94a3b8);
            border-radius: 99px;
        }

        .content-panel {
            display: grid;
            gap: 14px;
        }

        .tool-section {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 12px;
        }

        .section-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding: 2px 2px 10px;
            border-bottom: 1px solid #edf0f3;
        }

        .section-head h2 {
            margin: 0;
            font-size: clamp(18px, 2vw, 22px);
            font-weight: 700;
            color: #1f2937;
            letter-spacing: -0.2px;
            line-height: 1.2;
        }

        .section-meta {
            color: #6b7280;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.2px;
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 999px;
            padding: 5px 10px;
            white-space: nowrap;
        }

        .section-body {
            display: grid;
            gap: 10px;
        }

        .tool-row {
            display: grid;
            grid-template-columns: 1fr 24px 1fr;
            align-items: stretch;
        }

        .tool-group--intl {
            background: #f8fbff;
            border: 1px solid #e2eefd;
            border-radius: 12px;
            padding: 8px;
        }

        .tool-group--cn {
            background: #fffbf4;
            border: 1px solid #f5e9cf;
            border-radius: 12px;
            padding: 8px;
        }

        .tool-divider {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tool-divider::before {
            content: '';
            width: 2px;
            height: 92%;
            background: linear-gradient(180deg, #cbd5e1 0%, #94a3b8 100%);
            border-radius: 99px;
        }

        .tool-group {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 10px;
        }

        .tool-card {
            min-height: 74px;
            border: 1px solid var(--ai-border, #eceff2);
            border-radius: var(--ai-radius-sm, 10px);
            background: #fff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            transition: all 0.16s ease;
        }

        .tool-card:hover {
            border-color: #c7d2fe;
            box-shadow: var(--ai-shadow-brand, 0 6px 16px rgba(59, 130, 246, 0.1));
            transform: translateY(-1px);
        }

        .tool-card.disabled {
            opacity: 0.72;
            background: #fafafa;
            border-style: dashed;
            cursor: not-allowed;
        }

        .tool-card.placeholder {
            border-style: dashed;
            background: #fafafa;
        }

        .logo-wrap {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 1px solid var(--ai-border, #e5e7eb);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
            background: var(--ai-bg-surface, #fff);
        }

        .logo-wrap img {
            width: 30px;
            height: 30px;
            object-fit: contain;
        }

        .tool-meta {
            min-width: 0;
            display: grid;
            gap: 2px;
        }

        .tool-name {
            margin: 0;
            font-size: 15px;
            line-height: 1.25;
            font-weight: 700;
            color: #111827;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .tool-desc {
            font-size: 11px;
            font-weight: 700;
            color: var(--ai-brand-700, #1d4ed8);
            background: #eff6ff;
            border: 1px solid #dbeafe;
            border-radius: var(--ai-radius-pill, 999px);
            padding: 2px 8px;
            display: inline-block;
            width: fit-content;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .tool-status {
            font-size: 11px;
            color: #dc2626;
            font-weight: 700;
        }

        @media (max-width: 1240px) {
            .tools-layout {
                grid-template-columns: 190px minmax(0, 1fr);
            }

            .sidebar {
                max-height: calc(100vh - 92px);
            }

            .tool-group {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 980px) {
            .tools-page {
                padding-top: calc(var(--tools-nav-height) + 10px);
            }

            .tools-layout {
                grid-template-columns: 68px minmax(0, 1fr);
                gap: 10px;
            }

            .sidebar {
                padding: 8px 6px;
                top: calc(var(--tools-nav-height) + 8px);
                max-height: calc(100vh - 82px);
                overflow: auto;
            }

            .sidebar-title {
                display: none;
            }

            .category-list {
                display: grid;
                gap: 8px;
            }

            .category-link {
                justify-content: center;
                padding: 10px 0;
                min-height: 44px;
            }

            .category-link::before {
                left: 50%;
                top: auto;
                bottom: 5px;
                width: 18px;
                height: 4px;
                transform: translateX(-50%) scaleX(0.82);
            }

            .category-link:hover::before,
            .category-link.active::before {
                transform: translateX(-50%) scaleX(1);
            }

            .category-link span {
                display: none;
            }

            .category-link .category-icon {
                width: 30px;
                height: 30px;
            }

            .category-link .category-icon i {
                font-size: 18px;
                line-height: 1;
            }

            .category-link .category-icon svg {
                width: 18px;
                height: 18px;
            }
        }

        @media (max-width: 860px) {
            .lane-guide,
            .tool-row {
                grid-template-columns: 1fr;
            }

            .lane-divider,
            .tool-divider {
                display: none;
            }

            .tool-group {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .section-head h2 {
                font-size: 18px;
            }

            .section-meta {
                font-size: 11px;
                padding: 4px 8px;
            }

            .tool-card {
                min-height: 70px;
                padding: 9px 10px;
            }
        }
    </style>
</head>
